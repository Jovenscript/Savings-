<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Metas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0221">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        .metas-hero {
            padding: 0 !important;
            margin-left: 250px;
            position: relative;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* O CUBO OCUPANDO A TELA TODA (Descontando o Menu) */
        .metasSwiper { 
            width: 100%; 
            height: 100%; 
        }

        .swiper-slide {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Textos na parte de baixo */
            background-size: cover;
            background-position: center;
        }

        /* Degradê escuro embaixo para dar leitura ao texto */
        .meta-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
            z-index: 1;
        }

        .meta-content {
            position: relative;
            z-index: 3;
            padding: 4rem;
            color: white;
            text-align: center;
        }

        .meta-title { font-size: 4rem; font-weight: bold; margin-bottom: 5px; text-shadow: 0 4px 15px rgba(0,0,0,0.8); display: inline-block; }
        .meta-desc { font-size: 1.2rem; color: #ccc; text-shadow: 0 2px 10px rgba(0,0,0,0.8); letter-spacing: 2px; text-transform: uppercase; }

        .meta-stats { display: flex; justify-content: center; gap: 4rem; margin-top: 2.5rem; margin-bottom: 2rem;}
        .stat-box { position: relative; }
        .stat-number { display: block; font-size: 2.5rem; font-weight: bold; color: #fff; text-shadow: 0 0 15px rgba(0, 245, 212, 0.4); }
        .stat-label { font-size: 0.85rem; color: var(--primary-cyan); letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }

        .btn-edit-meta {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary-cyan);
            color: var(--primary-cyan);
            border-radius: 50%;
            width: 45px; height: 45px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 15px;
            vertical-align: middle;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .btn-edit-meta:hover { background: var(--primary-cyan); color: #000; transform: scale(1.1); }

        /* Bolinhas indicadoras do Cubo */
        .swiper-pagination-bullet { background: #fff; opacity: 0.4; width: 12px; height: 12px; margin: 0 8px !important;}
        .swiper-pagination-bullet-active { background: var(--primary-purple); opacity: 1; box-shadow: 0 0 15px var(--primary-purple); transform: scale(1.3); }

        /* MODO MOBILE */
        @media (max-width: 1024px) {
            .metas-hero { margin-left: 0; }
            .meta-content { padding: 2rem 1.5rem; padding-bottom: 4rem; }
            .meta-title { font-size: 2.5rem; }
            .meta-desc { font-size: 0.9rem; }
            .meta-stats { gap: 1.5rem; flex-wrap: wrap; margin-top: 1.5rem; margin-bottom: 1rem; }
            .stat-number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        <nav class="sidebar"></nav>

        <main class="main-content metas-hero">
            
            <div class="swiper metasSwiper">
                <div class="swiper-wrapper" id="cuboMetas">
                    </div>
                <div class="swiper-pagination" style="bottom: 20px;"></div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="metas.js"></script> 
    <script src="mobile.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
