<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Login</title>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0221">
<link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #1a0533, #000);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-card h1 {
            color: #fff;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .login-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #7000ff, #00ffff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
        }

        .error-msg {
            color: #ff4b4b;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>GEMS ELITE</h1>
        <p>Acesse o império da família</p>

        <form id="loginForm">
            <div class="input-group">
                <label>E-mail da Família</label>
                <input type="email" id="email" placeholder="exemplo@gmail.com" required>
            </div>

            <div class="input-group">
                <label>Senha Secreta</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Entrar no Sistema</button>
            <div id="errorMsg" class="error-msg">E-mail ou senha incorretos.</div>
        </form>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script src="pwa.js"></script>
    <script type="module" src="auth.js"></script>
</body>

</html>
