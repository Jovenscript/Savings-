<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Calendário</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <style>
        /* 💎 DESIGN VIDRO ROXO/CYAN E ANTI-SOPA DE LETRINHAS 💎 */
        
        /* 💥 O SEGREDO DO BARALHO: O Swiper precisa de tamanho fixo para o Cards Effect não sumir */
        .calendarSwiper {
            width: 320px;
            height: 480px;
            padding: 20px 0;
            overflow: visible; 
        }

        .calendarSwiper .swiper-slide {
            width: 100% !important;
            height: 100% !important;
            background: rgba(13, 2, 33, 0.8) !important; 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 245, 212, 0.4) !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .calendarSwiper .swiper-slide-active {
            border-color: rgba(0, 245, 212, 0.9) !important;
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.2);
        }

        .calendarSwiper .swiper-slide:not(.swiper-slide-active) .scroll-interno {
            opacity: 0 !important;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .calendarSwiper .swiper-slide-active .scroll-interno {
            opacity: 1 !important;
            visibility: visible;
            transition: opacity 0.5s ease-in-out;
        }

        .card-header-glass {
            text-align: center; 
            margin-bottom: 10px; 
            border-bottom: 1px dashed rgba(157, 78, 221, 0.3); 
            padding-bottom: 10px; 
            flex-shrink: 0;
        }
        .card-header-glass h2 {
            font-size: 3.8rem; 
            color: var(--primary-cyan); 
            margin: 0; 
            text-shadow: 0 0 15px rgba(0, 245, 212, 0.5);
        }

        /* 💥 CORREÇÃO DOS BOTÕES LATERAIS DO CALENDÁRIO (REDONDOS E BONITOS) */
        .calendar-nav-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid var(--primary-cyan);
            border-radius: 50%;
            width: 45px !important;
            height: 45px !important;
            color: var(--primary-cyan) !important;
            box-shadow: 0 4px 15px rgba(0, 245, 212, 0.2);
        }
        .calendar-nav-btn::after {
            font-size: 1.2rem !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        
        <nav class="sidebar">
            
        </nav>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h1 style="color: #fff; font-size: 2rem;">Calendário e Rotina</h1>
                    <p style="color: var(--text-muted);">Controle de contas e compromissos com visual Glass.</p>
                </div>
                <button id="btnToggleView" class="btn-primary" style="margin-top: 0; padding: 10px 20px; font-size: 0.9rem; max-width: 250px; background: rgba(157, 78, 221, 0.2); border: 1px solid var(--primary-purple); color: var(--text-main);">📅 Abrir Visão do Mês Completo</button>
            </header>

            <div class="calendar-page-layout">
                
                <div class="calendar-left-side" id="dayCarouselView">
                    <div class="month-controls" style="border-color: rgba(157, 78, 221, 0.3);">
                        <button onclick="mudarMes(-1)" style="color: var(--primary-purple);">❮</button>
                        <h2 id="mesAtualTitulo" style="color: #fff; margin: 0; font-size: 1.5rem; text-shadow: 0 0 10px rgba(157, 78, 221, 0.3);">Mês Ano</h2>
                        <button onclick="mudarMes(1)" style="color: var(--primary-purple);">❯</button>
                    </div>

                    <div style="display: flex; align-items: center; justify-content: center; width: 100%;">
                        <div class="swiper-button-prev calendar-nav-btn"></div>
                        
                        <div class="swiper calendarSwiper">
                            <div class="swiper-wrapper" id="calendarWrapper">
                                </div>
                        </div>
                        
                        <div class="swiper-button-next calendar-nav-btn"></div>
                    </div>
                </div>

                <div class="calendar-left-side" id="monthGridView" style="display: none;">
                    <div class="glass-panel" style="width: 100%; max-width: 450px; padding: 2rem;">
                        <div class="month-controls" style="margin-bottom: 30px; border: none; padding: 0; background: transparent;">
                            <h2 style="color: #fff; margin: 0; font-size: 1.5rem;">Visão Geral</h2>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: var(--primary-purple); margin-bottom: 15px; font-size: 0.85rem;">
                            <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                        </div>
                        <div id="monthGrid" class="month-grid">
                            </div>
                    </div>
                </div>

                <div class="calendar-right-side">
                    <div class="glass-panel" style="border-color: rgba(157, 78, 221, 0.2);">
                        <h3 id="formTitle" style="color: var(--primary-cyan);">AGENDAR PARA: 00/00/0000</h3>
                        <form id="formRecorrente">
                            <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;">Tipo de Lançamento:</label>
                            <select id="tipoEvento" required>
                                <option value="conta">💸 Conta a Pagar</option>
                                <option value="rotina">⏰ Rotina / Lembrete</option>
                            </select>

                            <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold; display: block; margin-top: 15px;">Descrição:</label>
                            <input type="text" id="descEvento" placeholder="Ex: Conta de Luz, Dentista..." required>

                            <div id="blocoValor" style="margin-top: 15px;">
                                <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;">Valor (R$):</label>
                                <input type="number" id="valorConta" placeholder="Ex: 150.00" step="0.01">
                            </div>

                            <div id="blocoHorario" style="margin-top: 15px; display: none;">
                                <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;">Horário:</label>
                                <input type="time" id="horarioRotina">
                            </div>

                            <button type="submit" class="btn-primary" style="margin-top: 25px;">+ Adicionar ao Dia</button>
                        </form>
                    </div>
                    
                    <div class="glass-panel" style="text-align: center; border-color: rgba(0, 245, 212, 0.2); background: rgba(0, 245, 212, 0.03);">
                        <h3 style="color: var(--primary-cyan);">Resumo do Mês</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">Total de contas a pagar:</p>
                        <h2 id="totalMesValor" style="font-size: 2.2rem; margin: 10px 0; color: #fff;">R$ 0,00</h2>
                        <p id="totalMesQtd" style="color: var(--danger-red); font-size: 0.85rem; font-weight: bold;">0 faturas pendentes</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="mobile.js"></script>
    <script src="calendario.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
