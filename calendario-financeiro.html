<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Calendário</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <style>
        .calendarSwiper {
            width: 320px;
            height: 480px;
            padding: 20px 0;
            overflow: visible; 
        }

        .calendarSwiper .swiper-slide {
            width: 100% !important;
            height: 100% !important;
            background: rgba(13, 2, 33, 0.95) !important; 
            border: 1px solid rgba(0, 245, 212, 0.2) !important;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .calendarSwiper .swiper-slide-active {
            background: rgba(13, 2, 33, 0.6) !important; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-color: rgba(0, 245, 212, 0.9) !important;
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.2);
        }

        .calendarSwiper .swiper-slide:not(.swiper-slide-active) .scroll-interno {
            opacity: 0 !important;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .calendarSwiper .swiper-slide-active .scroll-interno {
            opacity: 1 !important;
            visibility: visible;
            transition: opacity 0.5s ease-in-out;
        }

        .card-header-glass {
            text-align: center; 
            margin-bottom: 10px; 
            border-bottom: 1px dashed rgba(157, 78, 221, 0.3); 
            padding-bottom: 10px; 
            padding-top: 15px;
            flex-shrink: 0;
        }
        
        .card-header-glass h2 {
            font-size: 3.8rem; 
            color: var(--primary-cyan); 
            margin: 0; 
            text-shadow: 0 0 15px rgba(0, 245, 212, 0.5);
        }

        /* 💥 BOTÕES INDEPENDENTES DO SWIPER 💥 */
        .custom-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(13, 2, 33, 0.7) !important;
            backdrop-filter: blur(8px);
            border: 2px solid var(--primary-cyan) !important;
            border-radius: 50% !important;
            width: 50px !important;
            height: 50px !important;
            color: var(--primary-cyan) !important;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 245, 212, 0.3) !important;
            transition: all 0.3s ease !important;
            cursor: pointer;
            z-index: 100; /* Ficam sempre acima do baralho */
        }

        .custom-nav-btn:hover {
            background: var(--primary-cyan) !important;
            color: #000 !important;
            box-shadow: 0 0 25px var(--primary-cyan) !important;
            transform: translateY(-50%) scale(1.1);
        }

        #btnPrevCard { left: -10px; }
        #btnNextCard { right: -10px; }

        /* GRADE DOS MESES CORRIGIDA */
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px; 
            justify-items: center; 
            margin-top: 10px;
        }

        .grid-day {
            width: 42px;
            height: 42px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; 
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            color: #fff;
            font-size: 1rem;
        }

        .grid-day:hover {
            background: rgba(157, 78, 221, 0.4);
            border-color: var(--primary-purple);
            transform: translateY(-2px);
        }

        .grid-day.selected-day {
            background: var(--primary-cyan);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 15px var(--primary-cyan);
            border: none;
            transform: scale(1.1);
            z-index: 2;
        }

        .indicador-ponto {
            width: 6px;
            height: 6px;
            background-color: var(--danger-red);
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
            box-shadow: 0 0 5px var(--danger-red);
        }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        
        <nav class="sidebar"></nav>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h1 style="color: #fff; font-size: 2rem;">Calendário e Rotina</h1>
                    <p style="color: var(--text-muted);">Controle de contas e compromissos com visual Glass.</p>
                </div>
                <button id="btnToggleView" class="btn-primary" style="margin-top: 0; padding: 10px 20px; font-size: 0.9rem; max-width: 250px; background: rgba(157, 78, 221, 0.2); border: 1px solid var(--primary-purple); color: var(--text-main);">📅 Abrir Visão do Mês Completo</button>
            </header>

            <div class="calendar-page-layout">
                
                <div class="calendar-left-side" id="dayCarouselView">
                    
                    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 320px; margin: 0 auto 20px auto; background: rgba(13, 2, 33, 0.6); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 30px; border: 1px solid rgba(157, 78, 221, 0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.5);">
                        <button onclick="mudarMes(-1)" style="background: transparent; border: none; color: var(--primary-cyan); font-size: 1.5rem; cursor: pointer; transition: 0.3s; padding: 0; width: 30px;">❮</button>
                        <h2 id="mesAtualTitulo" style="color: #fff; margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0, 245, 212, 0.4); flex: 1; text-align: center;">Mês Ano</h2>
                        <button onclick="mudarMes(1)" style="background: transparent; border: none; color: var(--primary-cyan); font-size: 1.5rem; cursor: pointer; transition: 0.3s; padding: 0; width: 30px;">❯</button>
                    </div>

                    <div style="position: relative; width: 100%; max-width: 380px; margin: 0 auto; display: flex; justify-content: center; align-items: center;">
                        
                        <div id="btnPrevCard" class="custom-nav-btn" onclick="voltarDia()">❮</div>
                        
                        <div class="swiper calendarSwiper">
                            <div class="swiper-wrapper" id="calendarWrapper"></div>
                        </div>
                        
                        <div id="btnNextCard" class="custom-nav-btn" onclick="avancarDia()">❯</div>

                    </div>
                </div>

                <div class="calendar-left-side" id="monthGridView" style="display: none;">
                    <div class="glass-panel" style="width: 100%; max-width: 450px; padding: 2rem; margin: 0 auto;">
                        <div class="month-controls" style="margin-bottom: 20px; border: none; padding: 0; background: transparent; text-align: center;">
                            <h2 style="color: #fff; margin: 0; font-size: 1.5rem;">Visão Geral do Mês</h2>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: var(--primary-purple); margin-bottom: 10px; font-size: 0.9rem;">
                            <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                        </div>
                        
                        <div id="monthGrid" class="month-grid"></div>
                    </div>
                </div>

                <div class="calendar-right-side">
                    <div class="glass-panel" style="border-color: rgba(157, 78, 221, 0.2);">
                        <h3 id="formTitle" style="color: var(--primary-cyan);">AGENDAR PARA: 00/00/0000</h3>
                        <form id="formRecorrente">
                            <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;">Tipo de Lançamento:</label>
                            <select id="tipoEvento" required>
                                <option value="conta">💸 Conta a Pagar</option>
                                <option value="rotina">⏰ Rotina / Lembrete</option>
                            </select>

                            <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold; display: block; margin-top: 15px;">Descrição:</label>
                            <input type="text" id="descEvento" placeholder="Ex: Conta de Luz, Dentista..." required>

                            <div id="blocoValor" style="margin-top: 15px;">
                                <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;">Valor (R$):</label>
                                <input type="number" id="valorConta" placeholder="Ex: 150.00" step="0.01">
                            </div>

                            <div id="blocoHorario" style="margin-top: 15px; display: none;">
                                <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;">Horário:</label>
                                <input type="time" id="horarioRotina">
                            </div>

                            <button type="submit" class="btn-primary" style="margin-top: 25px;">+ Adicionar ao Dia</button>
                        </form>
                    </div>
                    
                    <div class="glass-panel" style="text-align: center; border-color: rgba(0, 245, 212, 0.2); background: rgba(0, 245, 212, 0.03);">
                        <h3 style="color: var(--primary-cyan);">Resumo do Mês</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">Total de contas a pagar:</p>
                        <h2 id="totalMesValor" style="font-size: 2.2rem; margin: 10px 0; color: #fff;">R$ 0,00</h2>
                        <p id="totalMesQtd" style="color: var(--danger-red); font-size: 0.85rem; font-weight: bold;">0 faturas pendentes</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="mobile.js"></script>
    <script src="calendario.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
