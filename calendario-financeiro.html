<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Calendário & Rotina</title>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0221">
<link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <nav class="sidebar">
            <div class="logo">GEMSELITE</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="transacoes.html">Transações</a></li>
                <li><a href="planejamento.html">Planejamento</a></li>
                
                <li class="active"><a href="calendario-financeiro.html">Calendário</a></li>
                
                <li><a href="metas.html">Metas</a></li>
                
                <li style="margin-top: 30px;"><a href="#" id="resetAppBtn" style="color: var(--danger-red); font-weight: bold;">🗑️ Resetar App</a></li>
            </ul>
        </nav>

        <main class="main-content">
            
            <header style="margin-bottom: 2rem;">
                <h1 style="color: #fff; font-size: 2rem;">Gestão de Vida & Finanças</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Acompanhe suas contas e compromissos diários.</p>
            </header>

            <div class="calendar-page-layout">
                
                <div class="calendar-left-side">
                    
                    <div class="month-controls">
                        <button id="btnPrevMonth">❮</button>
                        <h2 id="mesAtualTitulo" style="color: #fff; font-size: 1.5rem;">Mês Ano</h2>
                        <button id="btnNextMonth">❯</button>
                    </div>

                    <button id="btnToggleView" style="margin-bottom: 20px; width: 100%; max-width: 450px; background: transparent; border: 1px solid var(--primary-cyan); color: var(--primary-cyan); padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;">
                        📅 Abrir Visão do Mês Completo
                    </button>

                    <div id="dayCarouselView" style="display: flex; width: 100%; position: relative; align-items: center; justify-content: center;">
                        <div class="calendar-nav-btn swiper-button-prev"></div>
                        
                        <div class="swiper calendarSwiper">
                            <div class="swiper-wrapper" id="calendarWrapper">
                                </div>
                        </div>
                        
                        <div class="calendar-nav-btn swiper-button-next"></div>
                    </div>

                    <div id="monthGridView" style="display: none; width: 100%; max-width: 450px;" class="glass-panel">
                        <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; font-weight: bold;">
                            <span>DOM</span><span>SEG</span><span>TER</span><span>QUA</span><span>QUI</span><span>SEX</span><span>SÁB</span>
                        </div>
                        <div id="monthGrid" class="month-grid">
                            </div>
                    </div>
                </div>

                <div class="calendar-right-side">
                    
                    <div class="glass-panel" style="border-color: var(--primary-cyan); box-shadow: 0 0 15px rgba(0, 245, 212, 0.1);">
                        <h3 style="text-align: center; color: var(--primary-cyan);">RESUMO DO MÊS</h3>
                        <div style="text-align: center;">
                            <p style="font-size: 0.9rem; color: var(--text-main);">Total de contas a pagar:</p>
                            <h2 id="totalMesValor" style="font-size: 2.5rem; color: #fff; margin: 10px 0;">R$ 0,00</h2>
                            <p id="totalMesQtd" style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;">0 faturas pendentes</p>
                        </div>
                    </div>

                    <div class="glass-panel" style="border-color: var(--primary-purple); box-shadow: 0 0 15px rgba(157, 78, 221, 0.1);">
                        <h3 id="formTitle" style="text-align: center; color: var(--primary-purple);">AGENDAR PARA: </h3>
                        
                        <form id="formRecorrente">
                            <select id="tipoEvento" style="margin-bottom: 15px;">
                                <option value="conta">💰 Conta a Pagar</option>
                                <option value="rotina">⏰ Rotina / Lembrete</option>
                            </select>
                            
                            <input type="text" id="descEvento" placeholder="Descrição (Ex: Dentista, Fatura Luz)" required>
                            
                            <div id="blocoValor">
                                <input type="number" id="valorConta" placeholder="Valor (R$)" step="0.01">
                            </div>
                            
                            <div id="blocoHorario" style="display: none;">
                                <input type="time" id="horarioRotina">
                            </div>

                            <button type="submit" class="btn-primary" style="margin-top: 20px;">Agendar no Calendário</button>
                        </form>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script src="app.js"></script>
    
    <script src="calendario.js"></script>
       <script src="mobile.js"></script> 
       <script src="pwa.js"></script>
<script type="module" src="auth.js"></script>
</body>

</html>
