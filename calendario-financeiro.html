<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Calendário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <style>
        /* Estilos específicos da grade do calendário */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); }
        .calendar-header button { background: none; border: none; color: var(--primary-purple); font-size: 1.5rem; cursor: pointer; transition: 0.3s; padding: 0 15px; }
        .calendar-header button:hover { color: var(--primary-cyan); transform: scale(1.2); }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: var(--primary-purple); margin-bottom: 10px; font-size: 0.85rem; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day { aspect-ratio: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
        .day:hover { background: rgba(157, 78, 221, 0.3); border-color: var(--primary-purple); }
        .day.empty { background: transparent; border: none; cursor: default; }
        .day.today { border: 2px solid var(--primary-cyan); color: var(--primary-cyan); box-shadow: 0 0 10px rgba(0, 245, 212, 0.3); }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; align-items: start; }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        
        <nav class="sidebar">
            <div class="logo">GEMSELITE</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="transacoes.html">Transações</a></li>
                <li><a href="planejamento.html">Planejamento</a></li>
                <li class="active"><a href="calendario-financeiro.html">Calendário</a></li>
                <li><a href="metas.html">Metas</a></li>
                <li style="border-top: 1px dashed rgba(255,255,255,0.2); margin: 15px 0;"></li>
                <li><a href="convidados.html">💍 Convidados</a></li>
                <li><a href="orcamento-casamento.html">💰 Orçamento Casamento</a></li>
                <li style="margin-top: 30px;"><a href="#" id="btnLogout" style="color: #ff4b4b;">Sair do Sistema</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header style="margin-bottom: 20px;">
                <h1 style="color: #fff; font-size: 2rem;">Calendário de Contas</h1>
                <p style="color: var(--text-muted);">Acompanhe seus vencimentos diários.</p>
            </header>

            <div class="dashboard-grid">
                
                <div class="glass-panel">
                    <div class="calendar-header">
                        <button id="prevMonth">❮</button>
                        <h2 id="currentMonth" style="color: #fff; font-size: 1.2rem; margin: 0;">Mês Ano</h2>
                        <button id="nextMonth">❯</button>
                    </div>
                    
                    <div class="weekdays">
                        <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                    </div>
                    
                    <div id="calendarDays" class="days-grid">
                        </div>
                </div>

                <div class="glass-panel">
                    <h3>Faturas do Mês</h3>
                    <div id="upcomingBillsList" style="max-height: 450px; overflow-y: auto; padding-right: 5px;" class="scroll-interno">
                        </div>
                </div>

            </div>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="mobile.js"></script>
    <script src="calendario.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
