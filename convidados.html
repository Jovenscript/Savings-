<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Match dos Convidados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --tinder-yes: #00f5d4; --tinder-no: #ff4b4b; }
        .swiper { width: 90%; max-width: 320px; height: 400px; margin: 20px auto; }
        .guest-card {
            border-radius: 20px; display: flex; flex-direction: column; justify-content: center;
            padding: 25px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
        }
        .guest-name { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .tinder-controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .t-btn {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid;
            background: transparent; font-size: 1.5rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .t-btn.no { color: var(--tinder-no); border-color: var(--tinder-no); }
        .t-btn.yes { color: var(--tinder-yes); border-color: var(--tinder-yes); }
        .admin-section { margin-top: 2rem; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 2rem; }
        textarea { width: 100%; height: 100px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; padding: 10px; margin-top: 10px; resize: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">GEMSELITE</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li class="active"><a href="convidados.html">💍 Convidados</a></li>
                <li><a href="orcamento-casamento.html">💰 Orçamento Casamento</a></li>
                <li style="margin-top: 30px;"><a href="index.html" style="color: var(--primary-purple);">← Voltar</a></li>
                <li><a href="convidados.html">💍 Convidados</a></li>
<li><a href="orcamento-casamento.html">💰 Orçamento</a></li>
            </ul>
        </nav>
        <main class="main-content">
            <header style="text-align: center; margin-bottom: 20px;">
                <h1 style="color: var(--primary-cyan);">Match dos Convidados</h1>
                <p id="counter">Sincronizando...</p>
            </header>

            <div class="swiper tinderSwiper">
                <div class="swiper-wrapper" id="tinderWrapper"></div>
            </div>

            <div class="tinder-controls">
                <button class="t-btn no" onclick="decidirStatus('no')">✖</button>
                <button class="t-btn yes" onclick="decidirStatus('yes')">❤</button>
            </div>

            <section class="admin-section">
                <div class="dashboard-grid">
                    <div class="glass-panel">
                        <h3>✍️ Cadastro Individual</h3>
                        <form id="formManualGuest" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                            <input type="text" id="manualName" placeholder="Nome Completo" required>
                            <button type="submit" class="btn-primary">Adicionar</button>
                        </form>
                    </div>
                    <div class="glass-panel">
                        <h3>📊 Importar do Excel</h3>
                        <textarea id="excelPasteArea" placeholder="Cole aqui os nomes..."></textarea>
                        <button onclick="importarExcel()" class="btn-primary" style="margin-top: 10px;">Processar Lista</button>
                    </div>
                </div>
                <div class="glass-panel" style="margin-top: 20px; text-align: center;">
                    <button onclick="resetarTudo()" style="background: none; border: none; color: var(--danger-red); cursor: pointer; text-decoration: underline;">🗑️ Zerar toda a lista</button>
                </div>
            </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="convidados.js"></script>
</body>
</html>
