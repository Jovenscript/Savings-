<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Convidados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <style>
        :root { --tinder-yes: #00f5d4; --tinder-no: #ff4b4b; }
        .swiper { width: 90%; max-width: 320px; height: 420px; margin: 20px auto; }
        .guest-card {
            border-radius: 20px; display: flex; flex-direction: column; justify-content: center;
            padding: 30px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
        }
        .guest-name { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .tinder-controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .t-btn {
            width: 65px; height: 65px; border-radius: 50%; border: 2px solid;
            background: rgba(255,255,255,0.03); font-size: 1.6rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .t-btn.no { color: var(--tinder-no); border-color: var(--tinder-no); }
        .t-btn.yes { color: var(--tinder-yes); border-color: var(--tinder-yes); }
        .admin-section { margin-top: 2rem; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 2rem; }
        textarea { width: 100%; height: 100px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; padding: 10px; margin-top: 10px; resize: none; }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        
        <nav class="sidebar">
            <div class="logo">GEMSELITE</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="transacoes.html">Transações</a></li>
                <li><a href="planejamento.html">Planejamento</a></li>
                <li><a href="calendario-financeiro.html">Calendário</a></li>
                <li><a href="metas.html">Metas</a></li>
                <li style="border-top: 1px dashed rgba(255,255,255,0.2); margin: 15px 0;"></li>
                <li class="active"><a href="convidados.html">💍 Convidados</a></li>
                <li><a href="orcamento-casamento.html">💰 Orçamento Casamento</a></li>
                <li style="margin-top: 30px;"><a href="#" id="btnLogout" style="color: #ff4b4b;">Sair do Sistema</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header style="text-align: center;">
                <h1 style="color: var(--primary-cyan);">Match dos Convidados</h1>
                <p id="counter">Sincronizando...</p>
            </header>

            <div class="swiper tinderSwiper">
                <div class="swiper-wrapper" id="tinderWrapper"></div>
            </div>

            <div class="tinder-controls">
                <button class="t-btn no" onclick="decidirStatus('no')">✖</button>
                <button class="t-btn yes" onclick="decidirStatus('yes')">❤</button>
            </div>

            <section class="admin-section">
                <div class="dashboard-grid">
                    <div class="glass-panel">
                        <h3>✍️ Cadastro Individual</h3>
                        <form id="formManualGuest" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                            <input type="text" id="manualName" placeholder="Nome Completo" required>
                            <button type="submit" class="btn-primary">Adicionar</button>
                        </form>
                    </div>
                    <div class="glass-panel">
                        <h3>📊 Importar do Excel</h3>
                        <textarea id="excelPasteArea" placeholder="Cole os nomes da planilha aqui..."></textarea>
                        <button onclick="importarExcel()" class="btn-primary" style="margin-top: 10px;">Processar Nomes</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="mobile.js"></script>
    <script src="convidados.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
