<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Super App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0221">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* ESTILOS DO ONBOARDING */
        #onboardingModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100000;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .ob-content { background: var(--bg-dark); border: 1px solid var(--primary-purple); border-radius: 20px; padding: 40px; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 0 50px rgba(157, 78, 221, 0.3); }
        .ob-title { color: #fff; font-size: 2rem; margin-bottom: 10px; }
        .ob-subtitle { color: var(--text-muted); margin-bottom: 25px; }
        
        .ob-input {
            width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.5); 
            border: 1px solid var(--primary-cyan); color: #fff; margin-bottom: 30px; 
            font-size: 1rem; outline: none; text-align: left; font-weight: bold;
        }
        .ob-input:focus { box-shadow: 0 0 15px rgba(0, 245, 212, 0.4); }

        .ob-module-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff;
            padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; width: 100%; text-align: left; font-size: 1.1rem;
        }
        .ob-module-btn.active {
            background: rgba(0, 245, 212, 0.1); border-color: var(--primary-cyan); box-shadow: inset 0 0 10px rgba(0, 245, 212, 0.2);
        }
        
        #step2 { display: none; }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div id="onboardingModal" style="display: none;">
        <div class="ob-content" id="step1">
            <h2 class="ob-title">Boas-vindas! 💎</h2>
            <p class="ob-subtitle">Como podemos chamar você?</p>
            <input type="text" id="obName" class="ob-input" placeholder="Seu nome ou do Casal">

            <p class="ob-subtitle" style="margin-top: -10px;">O que quer organizar?</p>
            <button class="ob-module-btn active" style="pointer-events: none; opacity: 0.7;">📊 Finanças (Ativo)</button>
            <button class="ob-module-btn active" data-mod="metas" onclick="this.classList.toggle('active')">🎯 Metas e Sonhos</button>
            <button class="ob-module-btn" data-mod="casamento" onclick="this.classList.toggle('active')">💍 Casamento</button>

            <button class="btn-primary" onclick="irParaStep2()" style="margin-top: 20px; width: 100%;">Avançar ❯</button>
        </div>

        <div class="ob-content" id="step2">
            <h2 class="ob-title">Seus Sonhos</h2>
            <p class="ob-subtitle">Escreva 3 metas. Nossa IA vai gerar imagens 4K exclusivas para você.</p>
            <input type="text" id="dream1" class="ob-input" placeholder="Ex: Viagem para Maldivas" style="margin-bottom: 10px;">
            <input type="text" id="dream2" class="ob-input" placeholder="Ex: Porsche 911" style="margin-bottom: 10px;">
            <input type="text" id="dream3" class="ob-input" placeholder="Ex: Minha Casa Própria" style="margin-bottom: 10px;">

            <button class="btn-primary" onclick="finalizarOnboarding()" style="margin-top: 20px; width: 100%;">Gerar com IA ✨</button>
        </div>
    </div>

    <div class="app-container" id="appMainContainer">
        <nav class="sidebar"></nav>
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
                <div>
                    <h1 id="tituloBoasVindas" style="color: #fff; font-size: 2rem;">Carregando...</h1>
                    <p style="color: var(--text-muted);">Gire o cubo para navegar.</p>
                </div>
            </header>

            <div class="swiper superAppSwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="glass-panel" style="border-color: var(--primary-cyan);">
                            <h3 style="text-align: center; color: var(--text-muted);">Patrimônio Líquido</h3>
                            <h2 id="totalBalance" style="font-size: 3rem; color: #fff; text-align: center;">R$ 0,00</h2>
                            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 20px;">
                                <div style="display: flex; justify-content: space-between;"><span>Entradas:</span><strong id="resumoEntradas" style="color:var(--primary-cyan)">R$ 0,00</strong></div>
                                <div style="display: flex; justify-content: space-between;"><span>Saídas:</span><strong id="resumoSaidas" style="color:var(--danger-red)">R$ 0,00</strong></div>
                            </div>
                        </div>
                    </div>
                    </div>
                <div class="swiper-pagination"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="dashboard.js"></script>
    <script src="mobile.js"></script> 
    <script src="pwa.js"></script>

    <script>
        let moduloSelecionados = ['financas'];

        document.addEventListener('DOMContentLoaded', () => {
            const checkData = setInterval(() => {
                const userEmail = localStorage.getItem('gemsEliteLogin'); // Pega do auth.js
                
                if(typeof getData === 'function') {
                    clearInterval(checkData);
                    const dados = getData();
                    
                    // 🛡️ PASSAPORTE VIP CORRIGIDO
                    const emailsFundadores = ['carol18bistaffa@gmail.com', 'carol@gmail.com']; 
                    const isMarlonOuCarol = emailsFundadores.includes(userEmail);

                    // Se for e-mail oficial, pula o onboarding
                    if (isMarlonOuCarol) {
                        dados.config = dados.config || {
                            setupConcluido: true,
                            nomeUsuario: 'Marlon & Carol',
                            modulosAtivos: ['financas', 'metas', 'casamento']
                        };
                        atualizarTelaBaseadoNoUsuario(dados);
                        return;
                    }

                    // Se NÃO for Marlon/Carol e NÃO tiver setup concluído: Mostra Onboarding
                    if (!dados.config || !dados.config.setupConcluido) {
                        document.getElementById('appMainContainer').style.filter = 'blur(10px)';
                        document.getElementById('onboardingModal').style.display = 'flex';
                    } else {
                        atualizarTelaBaseadoNoUsuario(dados);
                    }
                }
            }, 300);
        });

        function atualizarTelaBaseadoNoUsuario(dados) {
            const nome = dados.config?.nomeUsuario || 'Usuário';
            document.getElementById('tituloBoasVindas').innerText = `Olá, ${nome} 👋`;
        }

        function irParaStep2() {
            if(!document.getElementById('obName').value.trim()) return alert("Diga seu nome!");
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function finalizarOnboarding() {
            const dados = getData();
            const nome = document.getElementById('obName').value.trim();
            
            dados.config = { setupConcluido: true, nomeUsuario: nome, modulosAtivos: ['financas', 'metas'] };

            const sonhos = [
                document.getElementById('dream1').value.trim(),
                document.getElementById('dream2').value.trim(),
                document.getElementById('dream3').value.trim()
            ].filter(s => s !== '');

            if (sonhos.length > 0) {
                dados.apresentacaoMetas = sonhos.map((s, i) => ({
                    id: `meta_${i}`,
                    title: s,
                    img: `https://image.pollinations.ai/prompt/${encodeURIComponent(s + " luxury 8k") || 'rich'}?width=1080&height=1920&nologo=true`,
                    defaultS1: "R$ 0", defaultS2: "0%", defaultS3: "Definir"
                }));
            }

            window.escudoAtivado = false; 
            saveData(dados);
            alert(`✨ Perfil criado, ${nome}!`);
            window.location.reload();
        }
    </script>
</body>
</html>
