<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Wedding Pulse</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .pulse-container { display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 20px; }
        .main-vault {
            width: 250px; height: 250px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.1) 0%, transparent 70%);
            border: 4px solid rgba(255, 255, 255, 0.05); box-shadow: 0 0 50px rgba(157, 78, 221, 0.2);
            position: relative; transition: 0.5s;
        }
        .main-vault h2 { font-size: 2.5rem; margin: 0; color: var(--primary-cyan); }
        .gems-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 100%; }
        .gem-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 15px; transition: 0.3s; position: relative; overflow: hidden;
        }
        .gem-progress { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--primary-cyan); box-shadow: 0 0 10px var(--primary-cyan); transition: width 0.8s; }
        .pay-input { margin-top: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--primary-purple); color: #fff; border-radius: 5px; padding: 5px; width: 100%; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">GEMSELITE</div>
            <ul class="nav-links">
                <li class="active"><a href="index.html">Dashboard</a></li>
                <li><a href="transacoes.html">Transações</a></li>
                <li><a href="planejamento.html">Planejamento</a></li>
                <li><a href="calendario-financeiro.html">Calendário</a></li>
                <li><a href="metas.html">Metas</a></li>
                <li><a href="#" id="btnLogout" style="color: #ff4b4b;">Sair do Sistema</a></li>
                <li><a href="convidados.html">💍 Convidados</a></li>
<li><a href="orcamento-casamento.html">💰 Orçamento</a></li>
            </ul>
        </nav>
        <main class="main-content">
            <header style="text-align: center; margin-bottom: 20px;">
                <h1>Wedding Pulse</h1>
                <p>Faltam <span id="daysCount">--</span> dias para 29/08/2026!</p>
            </header>
            <div class="pulse-container">
                <div class="main-vault" id="mainVault">
                    <span style="font-size:0.7rem; color:var(--text-muted)">TOTAL PAGO</span>
                    <h2 id="percTotal">0%</h2>
                    <span id="valTotal">R$ 0,00</span>
                </div>
                <div class="gems-grid" id="gemsGrid"></div>
            </div>
            <section class="glass-panel" style="margin-top: 40px; text-align: center;">
                <h3>📥 Importar Backup Completo (.json)</h3>
                <input type="file" id="jsonMaster" accept=".json" style="display:none">
                <button class="btn-primary" onclick="document.getElementById('jsonMaster').click()">Selecionar JSON</button>
            </section>
        </main>
    </div>
      <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
        <script src="dashboard.js"></script>
    <script src="mobile.js"></script> 
    <script src="pwa.js"></script>
</body>
</html>
