<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Wedding Pulse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <style>
        /* 💎 DESIGN DESLUMBRANTE DO ORÇAMENTO 💎 */
        .pulse-container { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 20px 0; }
        
        .main-vault {
            width: 250px; height: 250px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.1) 0%, rgba(13, 2, 33, 0.8) 80%);
            border: 2px solid rgba(0, 245, 212, 0.5); 
            box-shadow: 0 0 40px rgba(0, 245, 212, 0.3), inset 0 0 20px rgba(157, 78, 221, 0.2);
            position: relative;
            animation: pulse-glow 3s infinite alternate;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 30px rgba(0, 245, 212, 0.2), inset 0 0 15px rgba(157, 78, 221, 0.1); }
            100% { box-shadow: 0 0 50px rgba(0, 245, 212, 0.5), inset 0 0 30px rgba(157, 78, 221, 0.3); }
        }

        .main-vault h2 { font-size: 3.5rem; margin: 0; color: #fff; text-shadow: 0 0 15px var(--primary-cyan); }
        
        .gems-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; width: 100%; margin-top: 10px; }
        
        .gem-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(0,0,0,0.4)); 
            border: 1px solid var(--primary-purple);
            border-radius: 20px; padding: 25px; position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .gem-card:hover { transform: translateY(-5px); border-color: var(--primary-cyan); box-shadow: 0 15px 30px rgba(0, 245, 212, 0.15); }
        
        .gem-progress { position: absolute; bottom: 0; left: 0; height: 6px; background: linear-gradient(90deg, var(--primary-purple), var(--primary-cyan)); transition: width 0.8s ease-in-out; box-shadow: 0 -2px 10px rgba(0, 245, 212, 0.5); }
        
        .pay-input { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff; padding: 12px; width: 100%; margin-top: 15px; border-radius: 10px; font-weight: bold; }
        .pay-input:focus { border-color: var(--primary-cyan); box-shadow: 0 0 10px rgba(0, 245, 212, 0.2); }
        
        #modalAdd { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--bg-dark); border: 1px solid var(--primary-cyan); padding: 35px; border-radius: 25px; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0, 245, 212, 0.2); }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        <nav class="sidebar">
            
        </nav>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h1 style="color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3);">Wedding <span style="color: var(--primary-cyan);">Pulse</span></h1>
                    <p style="color: var(--text-muted);">Faltam <span id="daysCount" style="color: var(--danger-red); font-weight: bold; font-size: 1.2rem;">--</span> dias para o SIM!</p>
                </div>
                <button class="btn-primary" onclick="abrirModal()" style="width: auto; margin-top: 0; padding: 12px 25px; border-radius: 30px;">✨ Adicionar Fornecedor</button>
            </header>

            <div class="pulse-container">
                <div class="main-vault" id="mainVault">
                    <span style="font-size: 0.8rem; color: var(--text-muted); letter-spacing: 2px;">STATUS FINANCEIRO</span>
                    <h2 id="percTotal">0%</h2>
                    <span id="valTotal" style="font-size: 1.1rem; color: #fff; font-weight: bold; margin-top: 5px;">R$ 0,00 / R$ 0,00</span>
                </div>
                <div class="gems-grid" id="gemsGrid"></div>
            </div>
        </main>
    </div>

    <div id="modalAdd">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: #fff; text-align: center; font-size: 1.5rem;">Novo Contrato</h3>
            <div style="display: flex; flex-direction: column; gap: 15px; margin: 25px 0;">
                <input type="text" id="addNome" placeholder="Ex: Fotógrafo, Buffet, Alianças..." style="background: rgba(0,0,0,0.3);">
                <input type="number" id="addTotal" placeholder="Valor Total R$" style="background: rgba(0,0,0,0.3);">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" onclick="salvarNovoItem()" style="flex:1; margin-top: 0;">Salvar</button>
                <button class="btn-primary" onclick="fecharModal()" style="background: transparent; border: 1px solid var(--danger-red); color: var(--danger-red); flex:1; margin-top: 0;">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="mobile.js"></script>
    <script src="orcamento.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
