<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Wedding Pulse</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .pulse-container { display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 20px; }
        .main-vault {
            width: 220px; height: 220px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.05) 0%, transparent 75%);
            border: 4px solid rgba(255, 255, 255, 0.05); position: relative;
        }
        .main-vault h2 { font-size: 2.2rem; margin: 0; color: var(--primary-cyan); }
        .gems-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; width: 100%; margin-top: 20px; }
        .gem-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 18px; position: relative; overflow: hidden;
        }
        .gem-progress { position: absolute; bottom: 0; left: 0; height: 5px; background: var(--primary-cyan); transition: width 0.8s; }
        .pay-input { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff; padding: 8px; width: 100%; margin-top: 10px; border-radius: 8px; }
        
        /* Modal Simples */
        #modalAdd { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background: var(--bg-dark); border: 1px solid var(--primary-purple); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">GEMSELITE</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="convidados.html">💍 Convidados</a></li>
                <li class="active"><a href="orcamento-casamento.html">💰 Orçamento</a></li>
                <li style="margin-top: 50px;"><a href="index.html" style="color: var(--danger-red);">← Voltar</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 10px;">
                <div>
                    <h1 style="color: var(--primary-purple);">Wedding Pulse</h1>
                    <p>Faltam <span id="daysCount" style="color: #fff; font-weight: bold;">--</span> dias para o SIM!</p>
                </div>
                <button class="btn-primary" onclick="abrirModal()" style="padding: 10px 20px;">+ Item</button>
            </header>

            <div class="pulse-container">
                <div class="main-vault" id="mainVault">
                    <span style="font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px;">TOTAL PAGO</span>
                    <h2 id="percTotal">0%</h2>
                    <span id="valTotal" style="font-size: 0.8rem;">R$ 0,00</span>
                </div>
                <div class="gems-grid" id="gemsGrid"></div>
            </div>

            <div class="glass-panel" style="margin-top: 40px; text-align: center;">
                <h3>📥 Importar JSON</h3>
                <input type="file" id="jsonMaster" accept=".json" style="display:none">
                <button class="btn-primary" onclick="document.getElementById('jsonMaster').click()" style="background: transparent; border: 1px solid var(--primary-cyan); color: var(--primary-cyan);">Selecionar Backup</button>
            </div>
        </main>
    </div>

    <div id="modalAdd">
        <div class="modal-content glass-panel">
            <h3 style="margin-top: 0;">Novo Fornecedor</h3>
            <div style="display: flex; flex-direction: column; gap: 15px; margin: 20px 0;">
                <input type="text" id="addNome" placeholder="Ex: Fotógrafo, Alianças...">
                <input type="number" id="addTotal" placeholder="Valor Total R$">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" onclick="salvarNovoItem()" style="flex:1">Salvar</button>
                <button class="btn-primary" onclick="fecharModal()" style="background: var(--danger-red); flex:1">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="mobile.js"></script>
    <script src="orcamento.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
