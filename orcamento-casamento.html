<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Wedding Pulse</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .pulse-container { display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 20px; }
        .main-vault {
            width: 240px; height: 240px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.05) 0%, transparent 75%);
            border: 4px solid rgba(255, 255, 255, 0.05); transition: 0.5s;
        }
        .main-vault h2 { font-size: 2.8rem; margin: 0; color: var(--primary-cyan); }
        .gems-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; width: 100%; }
        .gem-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 18px; position: relative; overflow: hidden;
        }
        .gem-progress { position: absolute; bottom: 0; left: 0; height: 5px; background: var(--primary-cyan); transition: width 0.8s; }
        .pay-input { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff; padding: 8px; width: 100%; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">GEMSELITE</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="convidados.html">💍 Convidados</a></li>
                <li class="active"><a href="orcamento-casamento.html">💰 Orçamento</a></li>
                <li style="margin-top: 50px;"><a href="index.html" style="color: var(--danger-red);">← Sair</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header style="text-align: center;">
                <h1>Wedding Pulse</h1>
                <p>Faltam <span id="daysCount" style="font-weight: bold; color: #fff;">--</span> dias para o SIM!</p>
            </header>

            <div class="pulse-container">
                <div class="main-vault" id="mainVault">
                    <span style="font-size: 0.7rem; color: var(--text-muted);">PAGO</span>
                    <h2 id="percTotal">0%</h2>
                    <span id="valTotal" style="font-size: 0.9rem;">R$ 0,00</span>
                </div>
                <div class="gems-grid" id="gemsGrid"></div>
            </div>

            <section class="glass-panel" style="margin-top: 30px; text-align: center;">
                <h3>📥 Importar Backup JSON</h3>
                <input type="file" id="jsonMaster" accept=".json" style="display:none">
                <button class="btn-primary" onclick="document.getElementById('jsonMaster').click()">Selecionar Arquivo</button>
            </section>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="mobile.js"></script>
    <script src="orcamento.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
