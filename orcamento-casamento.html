<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Wedding Pulse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0221">
    <style>
        /* 💎 DESIGN DESLUMBRANTE DO ORÇAMENTO 💎 */
        .pulse-container { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 20px 0; }
        
        /* O "Reactor Arc" - Gráfico Circular Dinâmico */
        .progress-ring-container {
            position: relative;
            width: 280px; height: 280px;
            display: flex; justify-content: center; align-items: center;
        }

        .progress-ring {
            transform: rotate(-90deg); /* Faz o arco começar do topo */
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 15px rgba(0, 245, 212, 0.4));
        }

        .progress-ring__circle-bg {
            fill: rgba(13, 2, 33, 0.8);
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 12;
        }

        .progress-ring__circle-fill {
            fill: transparent;
            stroke: var(--primary-cyan);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1.5s ease-out;
            /* O JS vai calcular o tamanho desse dash */
        }

        .main-vault-content {
            position: absolute;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            z-index: 2;
        }

        .main-vault-content h2 { font-size: 3.8rem; margin: 0; color: #fff; text-shadow: 0 0 20px var(--primary-cyan); }
        .main-vault-content span { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 2px; }

        /* GAVETAS DE CATEGORIAS */
        .category-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        
        .cat-group {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
        }
        .cat-group:hover { border-color: rgba(157, 78, 221, 0.4); background: rgba(255, 255, 255, 0.04); }

        .cat-header {
            padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }
        
        .cat-header h3 { margin: 0; color: var(--primary-cyan); font-size: 1.3rem; }
        .cat-summary { text-align: right; }
        .cat-summary-total { font-size: 1.1rem; color: #fff; font-weight: bold; }
        .cat-summary-progress { font-size: 0.85rem; color: var(--text-muted); }

        /* A Gaveta Expandida */
        .cat-body {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, padding 0.5s ease;
        }
        .cat-group.active .cat-body {
            padding: 20px;
            max-height: 2000px; /* Limite alto para caber tudo */
            border-top-color: var(--glass-border);
        }

        /* Os Itens dentro da gaveta */
        .gem-card {
            background: linear-gradient(145deg, rgba(0,0,0,0.6), rgba(13, 2, 33, 0.8)); 
            border: 1px solid var(--primary-purple);
            border-radius: 15px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden;
        }
        .gem-card:last-child { margin-bottom: 0; }
        
        .gem-progress { position: absolute; bottom: 0; left: 0; height: 5px; background: linear-gradient(90deg, var(--primary-purple), var(--primary-cyan)); transition: width 0.8s ease-in-out; }
        
        .pay-input { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff; padding: 10px; width: 100%; margin-top: 10px; border-radius: 8px; font-weight: bold; }
        .pay-input:focus { border-color: var(--primary-cyan); box-shadow: 0 0 10px rgba(0, 245, 212, 0.2); }
        
        #modalAdd { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--bg-dark); border: 1px solid var(--primary-cyan); padding: 35px; border-radius: 25px; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0, 245, 212, 0.2); }
        
        select.modal-select { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 15px;}
        select.modal-select:focus { border-color: var(--primary-cyan); }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        <nav class="sidebar"></nav>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h1 style="color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3);">Wedding <span style="color: var(--primary-cyan);">Pulse</span></h1>
                    <p style="color: var(--text-muted);">Faltam <span id="daysCount" style="color: var(--danger-red); font-weight: bold; font-size: 1.2rem;">--</span> dias para o SIM!</p>
                </div>
                <button class="btn-primary" onclick="abrirModal()" style="width: auto; margin-top: 0; padding: 12px 25px; border-radius: 30px;">✨ Adicionar Fornecedor</button>
            </header>

            <div class="pulse-container">
                
                <div class="progress-ring-container">
                    <svg class="progress-ring" viewBox="0 0 250 250">
                        <circle class="progress-ring__circle-bg" cx="125" cy="125" r="110"></circle>
                        <circle id="anelProgresso" class="progress-ring__circle-fill" cx="125" cy="125" r="110"></circle>
                    </svg>
                    
                    <div class="main-vault-content">
                        <span style="margin-bottom: -5px;">PAGO ATÉ AGORA</span>
                        <h2 id="percTotal">0%</h2>
                        <span id="valTotal" style="margin-top: 5px; color: #fff; font-size: 0.9rem;">R$ 0,00 / R$ 0,00</span>
                    </div>
                </div>

                <div class="category-container" id="categoryContainer">
                    </div>
            </div>
        </main>
    </div>

    <div id="modalAdd">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: #fff; text-align: center; font-size: 1.5rem;">Novo Contrato</h3>
            
            <div style="display: flex; flex-direction: column; gap: 10px; margin: 25px 0;">
                <select id="addCat" class="modal-select">
                    <option value="🍽️ Buffet & Festa">🍽️ Buffet & Festa</option>
                    <option value="📸 Foto & Vídeo">📸 Foto & Vídeo</option>
                    <option value="👗 Trajes & Beleza">👗 Trajes & Beleza</option>
                    <option value="🎵 Música & Iluminação">🎵 Música & Iluminação</option>
                    <option value="🌸 Decoração">🌸 Decoração</option>
                    <option value="⛪ Cerimônia">⛪ Cerimônia</option>
                    <option value="✈️ Lua de Mel">✈️ Lua de Mel</option>
                    <option value="📦 Outros">📦 Outros</option>
                </select>

                <input type="text" id="addNome" placeholder="Fornecedor (Ex: Fotógrafo)" style="background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);">
                <input type="number" id="addTotal" placeholder="Valor Total R$" style="background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);">
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" onclick="salvarNovoItem()" style="flex:1; margin-top: 0;">Salvar</button>
                <button class="btn-primary" onclick="fecharModal()" style="background: transparent; border: 1px solid var(--danger-red); color: var(--danger-red); flex:1; margin-top: 0;">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="mobile.js"></script>
    <script src="orcamento.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
