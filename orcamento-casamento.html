<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Orçamento Clean</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0221">
    <style>
        /* VISUAL CLEAN - ESTILO APPLE/NUBANK */
        .budget-header { margin-bottom: 30px; }
        .focus-island {
            background: linear-gradient(135deg, rgba(13, 2, 33, 0.9), rgba(157, 78, 221, 0.2));
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; overflow: hidden;
        }
        .focus-island::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.1) 0%, transparent 60%);
            z-index: 0; pointer-events: none;
        }
        .focus-island-content { position: relative; z-index: 1; }
        .meta-mes-box {
            background: rgba(0, 245, 212, 0.1); border-left: 4px solid var(--primary-cyan);
            padding: 15px 20px; border-radius: 0 12px 12px 0; margin-bottom: 25px;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #fff; }
        .stat-value.highlight { color: var(--primary-cyan); }
        .stat-value.danger { color: var(--danger-red); }

        /* LISTA CLEAN DE FORNECEDORES */
        .supplier-list { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .supplier-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 20px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; flex-wrap: wrap; gap: 15px;
        }
        .supplier-card:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(157, 78, 221, 0.4); }
        .supplier-card.quitado { opacity: 0.6; border-color: rgba(0, 245, 212, 0.3); background: rgba(0, 245, 212, 0.05); }
        .supplier-card.quitado .s-name { text-decoration: line-through; color: var(--text-muted); }
        .s-info { flex: 2; min-width: 200px; }
        .s-name { font-size: 1.1rem; font-weight: bold; color: #fff; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;}
        .s-cat { font-size: 0.8rem; color: var(--primary-purple); background: rgba(157, 78, 221, 0.1); padding: 3px 8px; border-radius: 6px; }
        .s-finance { flex: 1; min-width: 150px; text-align: right; }
        .s-total { font-size: 1.1rem; color: #fff; font-weight: bold; }
        .s-pendente { font-size: 0.85rem; color: var(--danger-red); margin-top: 2px; }
        .s-action { flex: 1; min-width: 150px; display: flex; align-items: center; justify-content: flex-end; gap: 10px;}
        
        .pay-input { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff; padding: 10px; width: 120px; border-radius: 8px; font-weight: bold; text-align: right; }
        .pay-input:focus { border-color: var(--primary-cyan); outline: none; }
        .btn-delete { background: none; border: none; color: var(--danger-red); font-size: 1.2rem; cursor: pointer; padding: 5px; opacity: 0.5; transition: 0.3s; }
        .btn-delete:hover { opacity: 1; transform: scale(1.2); }

        /* MODAL */
        #modalAdd { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--bg-dark); border: 1px solid var(--primary-cyan); padding: 35px; border-radius: 25px; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0, 245, 212, 0.2); }
        select.modal-select, input.modal-input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 15px;}
        select.modal-select:focus, input.modal-input:focus { border-color: var(--primary-cyan); outline: none; }

        @media (max-width: 768px) {
            .supplier-card { flex-direction: column; align-items: flex-start; }
            .s-finance { text-align: left; width: 100%; }
            .s-action { width: 100%; justify-content: space-between; margin-top: 10px; }
            .pay-input { width: 100%; text-align: left; }
        }
    </style>
</head>
<body>
    <button id="hamburgerBtn">☰</button>
    <div id="mobileOverlay"></div>

    <div class="app-container">
        <nav class="sidebar"></nav>

        <main class="main-content">
            
            <header class="budget-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h1 style="color: #fff;">Orçamento Clean</h1>
                    <p style="color: var(--text-muted);">Faltam <strong style="color: var(--danger-red);" id="mesesRestantes">--</strong> meses para o Casamento.</p>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <label for="btnImportarCasamento" style="cursor: pointer; color: var(--primary-cyan); font-size: 0.85rem; padding: 10px; background: rgba(0, 245, 212, 0.1); border-radius: 10px; border: 1px solid var(--primary-cyan);">📂 Importar JSON</label>
                    <input type="file" id="btnImportarCasamento" accept=".json" style="display: none;" onchange="importarCasamentoJSON(event)">
                    
                    <button onclick="exportarCasamentoJSON()" style="cursor: pointer; color: var(--primary-purple); font-size: 0.85rem; padding: 10px; background: rgba(157, 78, 221, 0.1); border-radius: 10px; border: 1px solid var(--primary-purple); outline: none;">💾 Exportar JSON</button>
                    
                    <button class="btn-primary" onclick="abrirModal()" style="width: auto; margin-top: 0; padding: 12px 25px; border-radius: 30px;">+ Novo Contrato</button>
                </div>
            </header>

            <div class="focus-island">
                <div class="focus-island-content">
                    
                    <div class="meta-mes-box">
                        <div style="font-size: 0.85rem; color: var(--primary-cyan); font-weight: bold; margin-bottom: 5px;">🎯 META DE PAGAMENTO DO MÊS</div>
                        <div style="font-size: 1.5rem; color: #fff; font-weight: bold;" id="metaDoMes">R$ 0,00</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Pague este valor mensalmente para quitar tudo até o casamento sem gerar dívidas.</div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">Custo Total (Contratos)</span>
                            <span class="stat-value" id="valTotalCusto">R$ 0,00</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Total Já Pago ✅</span>
                            <span class="stat-value highlight" id="valJaPago">R$ 0,00</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Falta Pagar ⏳</span>
                            <span class="stat-value danger" id="valFaltaPagar">R$ 0,00</span>
                        </div>
                    </div>

                </div>
            </div>

            <div style="margin-top: 40px; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="color: #fff;">Seus Fornecedores</h3>
                <span id="contadorQuitados" style="font-size: 0.85rem; color: var(--primary-cyan); background: rgba(0, 245, 212, 0.1); padding: 5px 10px; border-radius: 10px;">0 Quitados</span>
            </div>

            <div class="supplier-list" id="supplierList"></div>

        </main>
    </div>

    <div id="modalAdd">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: #fff; text-align: center; font-size: 1.5rem; margin-bottom: 25px;">Novo Contrato</h3>
            
            <select id="addCat" class="modal-select">
                <option value="🍽️ Buffet & Festa">🍽️ Buffet & Festa</option>
                <option value="📸 Foto & Vídeo">📸 Foto & Vídeo</option>
                <option value="👗 Trajes & Beleza">👗 Trajes & Beleza</option>
                <option value="🎵 Música & Iluminação">🎵 Música & Iluminação</option>
                <option value="🌸 Decoração">🌸 Decoração</option>
                <option value="⛪ Cerimônia">⛪ Cerimônia</option>
                <option value="✈️ Lua de Mel">✈️ Lua de Mel</option>
                <option value="📦 Outros">📦 Outros</option>
            </select>

            <input type="text" id="addNome" class="modal-input" placeholder="Nome (Ex: Fotógrafo)">
            <input type="number" id="addTotal" class="modal-input" placeholder="Valor Total (R$)">

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" onclick="salvarNovoItem()" style="flex:1; margin-top: 0;">Salvar</button>
                <button class="btn-primary" onclick="fecharModal()" style="background: transparent; border: 1px solid var(--danger-red); color: var(--danger-red); flex:1; margin-top: 0;">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script src="app.js"></script>
    <script src="mobile.js"></script>
    <script src="orcamento.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
